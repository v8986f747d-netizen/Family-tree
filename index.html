const { useState, useMemo, useRef, useEffect, useCallback } = React;


/**
 * 家系年表エディタ (Kakei Nenpyo Editor)
 * ---------------------------------------------------------
 * すいすい家系図の操作感（タップで親・子・配偶者を追加）を踏襲しつつ、
 * 「年代（タイムライン軸）」を主役にした家系図。
 *
 * ・全画面表示。操作UIはキャンバス上に浮かぶオーバーレイ。
 * ・縦位置は生年（年）に揃える。名前は縦書きの角丸枠。
 * ・婚姻＝二重線、親子＝一本線。子の線は夫婦の二重線の中間から下りる。
 * ・縦軸＝西暦（元号帯つき）、横軸＝家系の枝分かれ。
 */

const CURRENT_YEAR = new Date().getFullYear();

// ---------------------------------------------------------------
// 日付ユーティリティ
// ---------------------------------------------------------------
const yearOf = (dateStr) => (dateStr ? Number(dateStr.split("-")[0]) : null);
function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return m && d ? `${y}年${Number(m)}月${Number(d)}日` : m ? `${y}年${Number(m)}月` : `${y}年`;
}
// 年・月・日 → "YYYY" / "YYYY-MM" / "YYYY-MM-DD"
function buildDate(y, m, d) {
  if (!y) return "";
  const p = (n) => String(n).padStart(2, "0");
  const yy = String(Number(y));
  if (m && d) return `${yy}-${p(Number(m))}-${p(Number(d))}`;
  if (m) return `${yy}-${p(Number(m))}`;
  return yy;
}
function splitDate(str) {
  if (!str) return { y: "", m: "", d: "" };
  const [y, m, d] = String(str).split("-");
  return { y: y || "", m: m ? String(Number(m)) : "", d: d ? String(Number(d)) : "" };
}
// ランダムな月日
const DAYS_IN = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
function randMonthDay() {
  const m = 1 + Math.floor(Math.random() * 12);
  const d = 1 + Math.floor(Math.random() * DAYS_IN[m - 1]);
  return { m: String(m), d: String(d) };
}
// 年齢（endDate 未指定なら現在まで）
function ageAt(birthDate, endDate) {
  if (!birthDate) return null;
  const [by, bm, bd] = String(birthDate).split("-").map(Number);
  const bM = bm || 1, bD = bd || 1;
  let ey, eM, eD;
  if (endDate) { const [y, m, d] = String(endDate).split("-").map(Number); ey = y; eM = m || 1; eD = d || 1; }
  else { const t = new Date(); ey = t.getFullYear(); eM = t.getMonth() + 1; eD = t.getDate(); }
  let age = ey - by;
  if (eM < bM || (eM === bM && eD < bD)) age--;
  return age;
}

// ---------------------------------------------------------------
// 元号帯
// ---------------------------------------------------------------
const ERAS = [
  { name: "江戸", start: 1603, end: 1868, color: "#D8D0C0" },
  { name: "明治", start: 1868, end: 1912, color: "#DCD2BD" },
  { name: "大正", start: 1912, end: 1926, color: "#CFDACE" },
  { name: "昭和", start: 1926, end: 1989, color: "#CFD8DE" },
  { name: "平成", start: 1989, end: 2019, color: "#E2D2CE" },
  { name: "令和", start: 2019, end: 2201, color: "#D9CFE0" },
];
const eraOf = (year) => ERAS.find((e) => year >= e.start && year < e.end) || ERAS[ERAS.length - 1];

// ---------------------------------------------------------------
// 身分（皇帝・皇族・宮家・一般）
// ---------------------------------------------------------------
const STATUS = {

  emperor: { label: "皇帝", border: "#D4AF37", royal: true, crown: true }, // 金＋王冠

  princely: { label: "宮家", border: "#1F9E7A", royal: true },              // エメラルドグリーン
};
const statusOf = (p) => STATUS[p.status || "general"];

// ---------------------------------------------------------------
// サンプルデータ（生年月日つき・5世代）
// ---------------------------------------------------------------
const seedPeople = () => ({
  p1: { id: "p1", uji: "山田", mei: "源蔵", sei: null, gender: "m", status: "emperor", order: 1, teimei: "高", accession: "1900-02-11", abdication: "1912-07-30", birthDate: "1875-03-12", deathDate: "1950-08-01", parents: [], spouses: ["p2"], children: ["p3"] },
  p2: { id: "p2", uji: "山田", mei: "とめ", sei: null, gender: "f", status: "imperial", birthDate: "1880-11-05", deathDate: "1955-02-20", parents: [], spouses: ["p1"], children: ["p3"] },
  p3: { id: "p3", uji: "山田", mei: "一郎", sei: null, gender: "m", status: "emperor", order: 2, teimei: "武", accession: "1912-07-30", abdication: "1926-12-25", birthDate: "1901-06-18", deathDate: "1978-12-03", parents: ["p1", "p2"], spouses: ["p4"], children: ["p5"] },
  p4: { id: "p4", uji: "山田", mei: "きぬ", sei: null, gender: "f", status: "imperial", birthDate: "1905-09-27", deathDate: "1988-04-14", parents: [], spouses: ["p3"], children: ["p5"] },
  p5: { id: "p5", uji: "山田", mei: "次郎", sei: null, gender: "m", status: "princely", birthDate: "1928-01-30", deathDate: "2001-07-22", parents: ["p3", "p4"], spouses: ["p6"], children: ["p7"] },
  p6: { id: "p6", uji: "山田", mei: "良子", sei: null, gender: "f", status: "princely", birthDate: "1932-05-08", deathDate: null, parents: [], spouses: ["p5"], children: ["p7"] },
  p7: { id: "p7", uji: "山田", mei: "太郎", sei: null, gender: "m", status: "general", birthDate: "1955-10-11", deathDate: null, parents: ["p5", "p6"], spouses: ["p8"], children: ["p9"] },
  p8: { id: "p8", uji: "山田", mei: "恵子", sei: null, gender: "f", status: "general", birthDate: "1958-02-24", deathDate: null, parents: [], spouses: ["p7"], children: ["p9"] },
  p9: { id: "p9", uji: "山田", mei: "陽菜", sei: null, gender: "f", status: "general", birthDate: "1990-07-19", deathDate: null, parents: ["p7", "p8"], spouses: [], children: ["p10"] },
  p10: { id: "p10", uji: "山田", mei: "蒼", sei: null, gender: "m", status: "general", birthDate: "2022-04-03", deathDate: null, parents: ["p9"], spouses: [], children: [] },
});

const uid = () => "p" + Math.random().toString(36).slice(2, 9);
const REL_LABEL = { parent: "親", child: "子", spouse: "配偶者" };
const bYear = (p) => yearOf(p.birthDate);
const dYear = (p) => yearOf(p.deathDate);
// 年齢順の比較キー（月日まで反映）。小さいほど年長。
const birthKey = (p) => {
  const [y, m, d] = String(p.birthDate || "").split("-");
  return (Number(y) || 0) + (Number(m) || 0) / 12 + (Number(d) || 0) / 372;
};

// 表示名：皇帝は「帝名＋帝」、姓があれば「姓の名」、なければ「氏 名」
const displayName = (p) => {
  if (p.status === "emperor" && p.teimei && String(p.teimei).trim()) return `${String(p.teimei).trim()}帝`;
  if (p.sei && String(p.sei).trim()) return `${String(p.sei).trim()}の${p.mei || ""}`;
  return [p.uji, p.mei].filter((s) => s && String(s).trim()).join(" ") || (p.mei || p.uji || "名称未設定");
};

// 旧データ（name 一括）の氏・名への移行
function migratePerson(p) {
  if (p.uji === undefined && p.mei === undefined && typeof p.name === "string") {
    const parts = p.name.trim().split(/\s+/);
    if (parts.length >= 2) { p.uji = parts[0]; p.mei = parts.slice(1).join(" "); }
    else { p.uji = ""; p.mei = p.name; }
  }
  if (p.uji === undefined) p.uji = "";
  if (p.mei === undefined) p.mei = "";
  if (p.sei === undefined) p.sei = null;
  return p;
}
const migratePeople = (people) => { Object.values(people || {}).forEach(migratePerson); return people; };

// 循環防止・候補絞り込み用
function collectAncestors(people, id, acc = new Set()) {
  (people[id]?.parents || []).forEach((pid) => { if (!acc.has(pid)) { acc.add(pid); collectAncestors(people, pid, acc); } });
  return acc;
}
function collectDescendants(people, id, acc = new Set()) {
  (people[id]?.children || []).forEach((cid) => { if (!acc.has(cid)) { acc.add(cid); collectDescendants(people, cid, acc); } });
  return acc;
}

// ---------------------------------------------------------------
// セーブデータの保存（localStorage。使えない環境ではメモリにフォールバック）
// ---------------------------------------------------------------
const SAVES_KEY = "kn_saves_v1";
const _mem = {};
const store = {
  get(k) { try { return localStorage.getItem(k); } catch { return k in _mem ? _mem[k] : null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch { _mem[k] = v; } },
};
const sid = () => "s" + Math.random().toString(36).slice(2, 9);

function loadSaves() {
  try {
    const raw = store.get(SAVES_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && typeof obj === "object" && Object.keys(obj).length) {
        Object.values(obj).forEach((s) => migratePeople(s.people));
        return obj;
      }
    }
  } catch {}
  const id = sid();
  return { [id]: { id, name: "山田家（サンプル）", updatedAt: Date.now(), people: seedPeople() } };
}
function persistSaves(saves) { store.set(SAVES_KEY, JSON.stringify(saves)); }
const personCount = (save) => Object.keys(save.people || {}).length;
function fmtTime(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// バックアップ（JSON）
const BACKUP_APP = "kakei-nenpyo";
function buildBackup(save) {
  return JSON.stringify(
    { app: BACKUP_APP, version: 1, exportedAt: new Date().toISOString(), name: save.name, people: save.people },
    null,
    2
  );
}
function safeFilename(name) {
  const base = (name || "家系図").replace(/[\\/:*?"<>|\s]+/g, "_").slice(0, 40);
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${base}_backup_${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}.json`;
}
function downloadText(filename, text) {
  try {
    const blob = new Blob([text], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return true;
  } catch {
    return false;
  }
}
// バックアップJSONを検証して people を取り出す
function parseBackup(text) {
  const obj = JSON.parse(text);
  const people = obj && (obj.people || (obj.save && obj.save.people));
  if (!people || typeof people !== "object" || !Object.keys(people).length) throw new Error("人物データが見つかりません");
  const ok = Object.values(people).every((p) => p && p.id && (typeof p.name === "string" || typeof p.mei === "string" || typeof p.uji === "string"));
  if (!ok) throw new Error("データ形式が正しくありません");
  migratePeople(people);
  const name = obj.name || (obj.save && obj.save.name) || "復元データ";
  return { name, people };
}

// ---------------------------------------------------------------
// レイアウト：横位置は家系の枝、縦位置は生年
// ---------------------------------------------------------------
function useLayout(people) {
  return useMemo(() => {
    const pos = new Map();
    const widthMap = new Map();
    const plan = new Map();
    const owned = new Set();
    const computing = new Set();

    // パスA：幅（列数）。夫婦は2列を確保。
    const width = (id) => {
      if (widthMap.has(id)) return widthMap.get(id);
      if (computing.has(id)) return 1; // 循環保護
      if (!people[id]) return 1;
      computing.add(id);
      owned.add(id);
      const p = people[id];
      const spouseId = p.spouses.find((s) => people[s] && !owned.has(s));
      if (spouseId) owned.add(spouseId);
      const kids = p.children
        .filter((c) => people[c] && !owned.has(c))
        .sort((x, y) => birthKey(people[y]) - birthKey(people[x])); // 年少→年長（左→右）＝年長が右
      kids.forEach((c) => owned.add(c));
      const coupleW = spouseId ? 2 : 1;
      const kidW = kids.map((c) => width(c));
      const childrenW = kidW.reduce((a, b) => a + b, 0);
      const W = Math.max(coupleW, childrenW, 1);
      plan.set(id, { spouseId, kids, kidW, childrenW });
      widthMap.set(id, W);
      computing.delete(id);
      return W;
    };

    // パスB：夫婦（婚姻線の中央）を、子たちの実際の中央の真上に置く。
    const assign = (id, left) => {
      const pl = plan.get(id);
      const W = widthMap.get(id);
      const spouse = pl.spouseId;
      const coupleW = spouse ? 2 : 1;

      if (pl.kids.length > 0 && pl.childrenW >= coupleW) {
        // 子が主：左から並べ、子の実際の中央（左端と右端の中点）に夫婦を合わせる
        let cx = left;
        const xs = [];
        pl.kids.forEach((c, i) => { assign(c, cx); xs.push(pos.get(c)); cx += pl.kidW[i]; });
        const cc = (xs[0] + xs[xs.length - 1]) / 2;
        if (spouse) { pos.set(id, cc - 0.5); pos.set(spouse, cc + 0.5); }
        else pos.set(id, cc);
      } else {
        // 夫婦（親）が主：バンド中央に据え、子はその真下に中央寄せ
        const cc = left + W / 2;
        if (spouse) { pos.set(id, cc - 0.5); pos.set(spouse, cc + 0.5); }
        else pos.set(id, cc);
        let cx = cc - pl.childrenW / 2;
        pl.kids.forEach((c, i) => { assign(c, cx); cx += pl.kidW[i]; });
      }
    };

    let cursor = 0;
    const roots = Object.values(people)
      .filter((p) => p.parents.length === 0 && !p.spouses.some((s) => people[s] && people[s].parents.length > 0))
      .sort((a, b) => birthKey(b) - birthKey(a)); // 年長を右に
    roots.forEach((r) => {
      if (owned.has(r.id)) return;
      const w = width(r.id);
      assign(r.id, cursor);
      cursor += w + 0.4;
    });
    Object.keys(people).forEach((id) => {
      if (!owned.has(id)) { const w = width(id); assign(id, cursor); cursor += w + 0.4; }
    });
    return pos;
  }, [people]);
}

// ---------------------------------------------------------------
// 家系図エディタ（1件のセーブデータを編集）
// ---------------------------------------------------------------
function Editor({ save, onUpdatePeople, onBack }) {
  const [people, setPeople] = useState(() => save.people);
  const [selectedId, setSelectedId] = useState(() => Object.keys(save.people)[0] || null);
  const [pxPerYear, setPxPerYear] = useState(9);
  const [modal, setModal] = useState(null);
  const [picker, setPicker] = useState(null); // { mode: 'spouse'|'adopt' }
  const scrollRef = useRef(null);

  // 変更を親（セーブデータ）へ自動保存
  const firstRef = useRef(true);
  useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; }
    onUpdatePeople(people);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [people]);

  const positions = useLayout(people);
  const X_SPACING = 56;
  const BOX_W = 38;
  const TOP_PAD = 74;
  const LEFT_PAD = 84;
  const charH = 15;

  const boxHeight = (p) => [...displayName(p)].length * charH + 8;

  const years = Object.values(people).flatMap((p) => [bYear(p), dYear(p) || CURRENT_YEAR]);
  const minYear = Math.min(...years) - 4;
  const maxYear = Math.max(...years, CURRENT_YEAR) + 6;
  const yearToY = (year) => (year - minYear) * pxPerYear + TOP_PAD;
  const totalHeight = yearToY(maxYear) + 60;
  const maxPos = Math.max(...[...positions.values()], 0);
  const totalWidth = (maxPos + 1) * X_SPACING + LEFT_PAD + 90;
  const centerX = (id) => LEFT_PAD + positions.get(id) * X_SPACING;

  useEffect(() => {
    if (!scrollRef.current || !positions.has(selectedId)) return;
    const el = scrollRef.current;
    const x = centerX(selectedId);
    const y = yearToY(bYear(people[selectedId]));
    el.scrollTo({ left: x - el.clientWidth / 2, top: y - el.clientHeight / 3, behavior: "smooth" });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedId, pxPerYear]);

  const addRootPerson = useCallback((form) => {
    const newId = uid();
    const person = {
      id: newId,
      uji: form.uji || "",
      mei: form.mei || "名称未設定",
      sei: form.status === "general" && form.sei && form.sei.trim() ? form.sei.trim() : null,
      gender: form.gender,
      status: form.status || "general",
      order: form.order ? Number(form.order) : null,
      teimei: form.status === "emperor" && form.teimei && form.teimei.trim() ? form.teimei.trim() : null,
      accession: form.status === "emperor" ? form.accession || null : null,
      abdication: form.status === "emperor" ? form.abdication || null : null,
      birthDate: form.birthDate,
      deathDate: form.deathDate || null,
      parents: [],
      spouses: [],
      children: [],
    };
    setPeople((prev) => ({ ...prev, [newId]: person }));
    setSelectedId(newId);
    setModal(null);
  }, []);

  const addPerson = useCallback((mode, targetId, form) => {
    setPeople((prev) => {
      const next = { ...prev };
      const newId = uid();
      const target = next[targetId];
      const newPerson = {
        id: newId,
        uji: form.uji || "",
        mei: form.mei || "名称未設定",
        sei: form.status === "general" && form.sei && form.sei.trim() ? form.sei.trim() : null,
        gender: form.gender,
        status: form.status || "general",
        order: form.order ? Number(form.order) : null,
        teimei: form.status === "emperor" && form.teimei && form.teimei.trim() ? form.teimei.trim() : null,
        accession: form.status === "emperor" ? form.accession || null : null,
        abdication: form.status === "emperor" ? form.abdication || null : null,
        birthDate: form.birthDate,
        deathDate: form.deathDate || null,
        parents: [],
        spouses: [],
        children: [],
      };
      if (mode === "parent") {
        if (target.parents.length >= 2) return prev;
        newPerson.children = [targetId];
        next[targetId] = { ...target, parents: [...target.parents, newId] };
      } else if (mode === "child") {
        newPerson.parents = target.spouses[0] ? [targetId, target.spouses[0]] : [targetId];
        next[targetId] = { ...target, children: [...target.children, newId] };
        if (target.spouses[0] && next[target.spouses[0]]) {
          const sp = next[target.spouses[0]];
          next[target.spouses[0]] = { ...sp, children: [...sp.children, newId] };
        }
      } else if (mode === "spouse") {
        newPerson.spouses = [targetId];
        next[targetId] = { ...target, spouses: [...target.spouses, newId] };
      }
      next[newId] = newPerson;
      return next;
    });
    setModal(null);
  }, []);

  const updatePerson = useCallback((id, form) => {
    setPeople((prev) => ({
      ...prev,
      [id]: { ...prev[id], uji: form.uji || "", mei: form.mei || "名称未設定", sei: form.status === "general" && form.sei && form.sei.trim() ? form.sei.trim() : null, gender: form.gender, status: form.status || "general", order: form.order ? Number(form.order) : null, teimei: form.status === "emperor" && form.teimei && form.teimei.trim() ? form.teimei.trim() : null, accession: form.status === "emperor" ? form.accession || null : null, abdication: form.status === "emperor" ? form.abdication || null : null, birthDate: form.birthDate, deathDate: form.deathDate || null },
    }));
    setModal(null);
  }, []);

  const deletePerson = useCallback((id) => {
    setPeople((prev) => {
      const next = {};
      Object.values(prev).forEach((p) => {
        if (p.id === id) return;
        next[p.id] = {
          ...p,
          parents: p.parents.filter((x) => x !== id),
          children: p.children.filter((x) => x !== id),
          spouses: p.spouses.filter((x) => x !== id),
        };
      });
      return next;
    });
    setModal(null);
    setSelectedId((cur) => (cur === id ? null : cur));
  }, []);

  // 既存の人物どうしを婚姻でつなぐ
  const linkSpouse = useCallback((aId, bId) => {
    setPeople((prev) => {
      const a = prev[aId], b = prev[bId];
      if (!a || !b || aId === bId) return prev;
      return {
        ...prev,
        [aId]: { ...a, spouses: [...new Set([...a.spouses, bId])] },
        [bId]: { ...b, spouses: [...new Set([...b.spouses, aId])] },
      };
    });
    setPicker(null);
  }, []);

  // 既存の人物を（選択中の人物＋配偶者の）養子にする
  const adoptExisting = useCallback((parentId, childId) => {
    setPeople((prev) => {
      if (!prev[parentId] || !prev[childId] || parentId === childId) return prev;
      const next = { ...prev };
      // いまの親から切り離す
      (next[childId].parents || []).forEach((op) => {
        if (next[op]) next[op] = { ...next[op], children: next[op].children.filter((x) => x !== childId) };
      });
      const co = next[parentId].spouses[0] && next[next[parentId].spouses[0]] ? next[parentId].spouses[0] : null;
      const newParents = co ? [parentId, co] : [parentId];
      next[childId] = { ...next[childId], parents: newParents, adopted: true };
      next[parentId] = { ...next[parentId], children: [...new Set([...next[parentId].children, childId])] };
      if (co) next[co] = { ...next[co], children: [...new Set([...next[co].children, childId])] };
      return next;
    });
    setPicker(null);
  }, []);

  // 接続線：婚姻＝二重線、親子＝一本線（夫婦線の中間から下りる）
  const { spouseLines, childSegments } = useMemo(() => {
    const couples = new Map(); // key "a|b" → { x1,y1,x2,y2, mx, my }
    Object.values(people).forEach((p) => {
      p.spouses.forEach((sid) => {
        if (!people[sid]) return;
        const [a, b] = [p.id, sid].sort();
        const key = `${a}|${b}`;
        if (couples.has(key)) return;
        const ax = centerX(a), bx = centerX(b);
        // 各枠の縦中央から伸ばす
        const cyA = yearToY(bYear(people[a])) + boxHeight(people[a]) / 2;
        const cyB = yearToY(bYear(people[b])) + boxHeight(people[b]) / 2;
        const aLeft = ax < bx;
        const x1 = ax + (aLeft ? BOX_W / 2 : -BOX_W / 2), y1 = cyA;
        const x2 = bx + (aLeft ? -BOX_W / 2 : BOX_W / 2), y2 = cyB;
        couples.set(key, { x1, y1, x2, y2, mx: (ax + bx) / 2, my: (cyA + cyB) / 2 });
      });
    });

    const spouseLines = [...couples.entries()].map(([key, c]) => ({ key, ...c }));

    // 親子は直線のみ：婚姻線から1本下ろし、最長子の高さで横に分岐、各子へ縦に落とす
    const groups = new Map(); // key → { ox, oy, kids:[{x,cyTop,adopted}] }
    Object.values(people).forEach((c) => {
      const par = c.parents.filter((x) => people[x]);
      if (!par.length) return;
      let key, ox, oy;
      if (par.length >= 2) {
        key = [par[0], par[1]].sort().join("|");
        const cp = couples.get(key);
        if (cp) { ox = cp.mx; oy = cp.my; }
        else {
          ox = (centerX(par[0]) + centerX(par[1])) / 2;
          oy = (yearToY(bYear(people[par[0]])) + boxHeight(people[par[0]]) / 2 + yearToY(bYear(people[par[1]])) + boxHeight(people[par[1]]) / 2) / 2;
        }
      } else {
        key = `single-${par[0]}`;
        ox = centerX(par[0]);
        oy = yearToY(bYear(people[par[0]])) + boxHeight(people[par[0]]) / 2;
      }
      const g = groups.get(key) || { ox, oy, kids: [] };
      g.kids.push({ x: centerX(c.id), cyTop: yearToY(bYear(c)), adopted: !!c.adopted });
      groups.set(key, g);
    });

    const childSegments = [];
    let gi = 0;
    groups.forEach((g) => {
      gi += 1;
      const xs = g.kids.map((k) => k.x);
      const busY = Math.min(...g.kids.map((k) => k.cyTop)); // 最長子（最も上）の高さ
      // 婚姻線 → 横の分岐線への1本
      childSegments.push({ key: `g${gi}-stem`, x1: g.ox, y1: g.oy, x2: g.ox, y2: busY });
      // 最長子の高さの横直線
      if (g.kids.length > 1) {
        childSegments.push({ key: `g${gi}-bus`, x1: Math.min(...xs), y1: busY, x2: Math.max(...xs), y2: busY });
      }
      // 各子へ縦に落とす
      g.kids.forEach((k, i) => {
        if (k.cyTop > busY + 0.5) childSegments.push({ key: `g${gi}-d${i}`, x1: k.x, y1: busY, x2: k.x, y2: k.cyTop, adopted: k.adopted });
      });
    });
    return { spouseLines, childSegments };
  }, [people, positions, pxPerYear]);

  const selected = selectedId ? people[selectedId] : null;
  const MARRIAGE = "#5A4A38";
  const LINEAGE = "#9C8253";

  // 人物がまだいないセーブデータ：最初の人物を追加する画面
  if (!Object.keys(people).length) {
    return (
      <div className="w-full h-screen relative flex flex-col items-center justify-center" style={{ background: "#EDE7D9", fontFamily: "'Noto Sans JP', sans-serif" }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
          .kn-title { font-family: 'Shippori Mincho', serif; }
        `}</style>
        <button onClick={onBack} className="absolute top-4 left-4" style={{ fontSize: 13, color: "#A73B2E", fontWeight: 600, cursor: "pointer" }}>← 一覧</button>
        <div className="kn-title text-xl mb-1" style={{ color: "#262220" }}>{save.name}</div>
        <p className="text-sm mb-5" style={{ color: "#6B6152" }}>まだ人物がいません。最初のご先祖を追加しましょう。</p>
        <button onClick={() => setModal({ mode: "root" })} style={{ padding: "12px 22px", borderRadius: 12, background: "#A73B2E", color: "#FBF7ED", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>＋ 最初の人物を追加</button>
        {modal && (
          <PersonModal modal={modal} people={people} onClose={() => setModal(null)} onSubmit={(form) => addRootPerson(form)} />
        )}
      </div>
    );
  }

  return (
    <div className="w-full h-screen relative overflow-hidden" style={{ background: "#EDE7D9", fontFamily: "'Noto Sans JP', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
        .kn-title { font-family: 'Shippori Mincho', serif; }
        .kn-mono { font-family: 'JetBrains Mono', monospace; }
        .kn-vname { writing-mode: vertical-rl; letter-spacing: 1px; white-space: nowrap; }
        .kn-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
        .kn-scroll::-webkit-scrollbar-thumb { background: #B08D5399; border-radius: 6px; }
      `}</style>

      {/* 全画面キャンバス */}
      <div ref={scrollRef} className="kn-scroll absolute inset-0 overflow-auto" onClick={() => setSelectedId(null)}>
        <div style={{ position: "relative", width: totalWidth, height: totalHeight }}>
          {/* 元号帯 */}
          {ERAS.map((era) => {
            const y1 = yearToY(Math.max(era.start, minYear));
            const y2 = yearToY(Math.min(era.end, maxYear));
            if (y2 <= TOP_PAD || y1 >= totalHeight) return null;
            return (
              <div key={era.name} style={{ position: "absolute", left: 0, top: y1, width: totalWidth, height: Math.max(y2 - y1, 0), background: era.color, opacity: 0.5 }}>
                <span className="kn-title" style={{ position: "sticky", left: 10, top: 6, display: "inline-block", writingMode: "vertical-rl", fontSize: 14, color: "#262220", opacity: 0.7, letterSpacing: 2 }}>{era.name}</span>
              </div>
            );
          })}

          {/* 10年刻みの目盛り */}
          {Array.from({ length: Math.ceil((maxYear - minYear) / 10) + 1 }, (_, i) => minYear - (minYear % 10) + i * 10)
            .filter((y) => y >= minYear && y <= maxYear)
            .map((y) => (
              <div key={y} style={{ position: "absolute", left: 0, top: yearToY(y), width: totalWidth, borderTop: "1px dashed #B08D5344" }}>
                <span className="kn-mono" style={{ position: "sticky", left: 34, fontSize: 10, color: "#8A7F68", background: "#EDE7D9CC", padding: "0 3px" }}>{y}</span>
              </div>
            ))}

          {/* 接続線 */}
          <svg width={totalWidth} height={totalHeight} style={{ position: "absolute", left: 0, top: 0, pointerEvents: "none" }}>
            {/* 親子：直線のみ（婚姻線から縦1本 → 最長子の高さで横 → 各子へ縦） */}
            {childSegments.map((l) => (
              <line
                key={l.key}
                x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
                stroke={LINEAGE}
                strokeWidth="1.6"
                strokeDasharray={l.adopted ? "5 3" : undefined}
              />
            ))}
            {/* 婚姻：二重線 */}
            {spouseLines.map((c) => (
              <g key={c.key}>
                <line x1={c.x1} y1={c.y1} x2={c.x2} y2={c.y2} stroke={MARRIAGE} strokeWidth="1.5" />
                <line x1={c.x1} y1={c.y1 + 3} x2={c.x2} y2={c.y2 + 3} stroke={MARRIAGE} strokeWidth="1.5" />
              </g>
            ))}
          </svg>

          {/* 人物：縦書きの名前を入れた角丸の枠 */}
          {Object.values(people).map((p) => {
            const cx = centerX(p.id);
            const topY = yearToY(bYear(p));
            const h = boxHeight(p);
            const isSel = p.id === selectedId;
            const base = p.gender === "f" ? "#B5566B" : p.gender === "m" ? "#3E6B8C" : "#7A6C55";
            const st = statusOf(p);
            return (
              <div key={p.id} style={{ position: "absolute", left: cx, top: topY }}>
                {/* 皇帝：王冠＋第◯代＋在位（年のみ） */}
                {st.crown && (() => {
                  const hasOrder = !!p.order;
                  const accY = p.accession ? yearOf(p.accession) : null;
                  const abdY = p.abdication ? yearOf(p.abdication) : (p.deathDate ? yearOf(p.deathDate) : null);
                  const reign = accY ? `在位 ${accY}–${abdY != null ? abdY : ""}` : null;
                  const CROWN_H = 19, PILL_H = 14, REIGN_H = 12, GAP = 2;
                  let total = CROWN_H;
                  if (hasOrder) total += GAP + PILL_H;
                  if (reign) total += GAP + REIGN_H;
                  return (
                    <div style={{ position: "absolute", left: -BOX_W / 2 - 16, width: BOX_W + 32, top: -total - 2, display: "flex", flexDirection: "column", alignItems: "center", gap: GAP, pointerEvents: "none" }}>
                      <svg width="28" height="19" viewBox="0 0 28 19">
                        <path d="M3 16 L3 5 L9 10 L14 2 L19 10 L25 5 L25 16 Z" fill="#D4AF37" stroke="#9A7B12" strokeWidth="1" strokeLinejoin="round" />
                        <rect x="3" y="15.5" width="22" height="3" rx="1" fill="#D4AF37" stroke="#9A7B12" strokeWidth="0.6" />
                        <circle cx="14" cy="2" r="1.7" fill="#F0D879" stroke="#9A7B12" strokeWidth="0.6" />
                        <circle cx="3.5" cy="5" r="1.4" fill="#F0D879" stroke="#9A7B12" strokeWidth="0.5" />
                        <circle cx="24.5" cy="5" r="1.4" fill="#F0D879" stroke="#9A7B12" strokeWidth="0.5" />
                      </svg>
                      {hasOrder && (
                        <span style={{ fontSize: 8.5, fontWeight: 700, color: "#8A6D0F", background: "#FBF7ED", border: "1px solid #D4AF37", borderRadius: 6, padding: "0 4px", lineHeight: "12px", whiteSpace: "nowrap" }}>第{p.order}代</span>
                      )}
                      {reign && (
                        <span className="kn-mono" style={{ fontSize: 8, color: "#8A6D0F", background: "#FBF7ED", borderRadius: 4, padding: "0 3px", lineHeight: "11px", whiteSpace: "nowrap" }}>{reign}</span>
                      )}
                    </div>
                  );
                })()}
                <button
                  onClick={(e) => { e.stopPropagation(); setSelectedId(p.id); }}
                  title={`${displayName(p)}（${st.label}／${bYear(p)}${p.deathDate ? "–" + dYear(p) : "–"}）`}
                  className="kn-vname"
                  style={{
                    position: "absolute",
                    left: -BOX_W / 2,
                    top: 0,
                    width: BOX_W,
                    height: h,
                    borderRadius: 12,
                    padding: "8px 0 6px",
                    display: "flex",
                    justifyContent: "center",
                    alignItems: "flex-start",
                    background: "#FBF7ED",
                    border: `${st.royal ? 2.5 : 2}px solid ${st.border}`,
                    borderTopWidth: 4,
                    borderTopColor: base,
                    boxShadow: isSel
                      ? `0 0 0 3px #26222033${st.royal ? `, 0 0 9px ${st.border}88` : ""}`
                      : "0 1px 3px #00000014",
                    cursor: "pointer",
                    fontSize: 13,
                    fontWeight: isSel ? 700 : 500,
                    color: "#262220",
                  }}
                >
                  {displayName(p)}
                </button>
                {p.adopted && (
                  <div title="養子" style={{ position: "absolute", left: BOX_W / 2 - 8, top: -8, width: 16, height: 16, borderRadius: 16, background: "#6B5B47", color: "#FBF7ED", fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", border: "1.5px solid #FBF7ED", pointerEvents: "none" }}>養</div>
                )}
                <div className="kn-mono" style={{ position: "absolute", left: -BOX_W / 2 - 14, top: h + 2, width: BOX_W + 28, textAlign: "center", fontSize: 9, color: "#8A7F68", whiteSpace: "nowrap", lineHeight: 1.35 }}>
                  <div>{bYear(p)}{p.deathDate ? `–${dYear(p)}` : "–"}</div>
                  {(() => {
                    const age = ageAt(p.birthDate, p.deathDate || null);
                    if (age == null) return null;
                    return <div style={{ color: "#6B5B47", fontWeight: 600 }}>{p.deathDate ? `${age}歳没` : `${age}歳`}</div>;
                  })()}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 左上：一覧へ戻る＋タイトル＋ズーム */}
      <div className="absolute top-3 left-3 flex items-center gap-3 px-4 py-2 rounded-full" style={{ background: "#FBF7EDE6", border: "1px solid #C9BFA8", backdropFilter: "blur(4px)" }}>
        <button onClick={onBack} title="セーブ一覧へ戻る" style={{ fontSize: 13, color: "#A73B2E", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>← 一覧</button>
        <div style={{ width: 1, height: 18, background: "#C9BFA8" }} />
        <h1 className="kn-title text-base truncate" style={{ color: "#262220", maxWidth: 160 }}>{save.name}</h1>
        <div className="flex items-center gap-2">
          <span className="text-xs" style={{ color: "#6B6152" }}>縮尺</span>
          <input type="range" min="3" max="20" value={pxPerYear} onChange={(e) => setPxPerYear(Number(e.target.value))} style={{ width: 90, accentColor: "#A73B2E" }} />
          <span className="text-xs kn-mono w-12" style={{ color: "#6B6152" }}>{pxPerYear}px/年</span>
        </div>
      </div>

      {/* 右上：選択中の人物パネル */}
      {selected && (
        <div className="absolute top-3 right-3 rounded-xl p-4" style={{ width: 244, background: "#FBF7EDF2", border: "1px solid #C9BFA8", boxShadow: "0 4px 18px #00000018", backdropFilter: "blur(4px)" }}>
          <div className="flex items-center gap-2">
            <div className="kn-title text-lg" style={{ color: "#262220" }}>{displayName(selected)}</div>
            <span style={{ fontSize: 10, padding: "1px 7px", borderRadius: 999, border: `1.5px solid ${statusOf(selected).border}`, color: "#4A4335", background: "#FFFDF8" }}>{statusOf(selected).label}{selected.status === "emperor" && selected.order ? ` 第${selected.order}代` : ""}</span>
            {selected.adopted && <span style={{ fontSize: 10, padding: "1px 7px", borderRadius: 999, border: "1.5px solid #6B5B47", color: "#4A4335", background: "#FFFDF8" }}>養子</span>}
          </div>
          <div className="text-xs mt-1 mb-3" style={{ color: "#6B6152", lineHeight: 1.6 }}>
            <div>生 {fmtDate(selected.birthDate)}（{eraOf(bYear(selected)).name}）</div>
            <div>{selected.deathDate ? `没 ${fmtDate(selected.deathDate)}` : "存命"}</div>
            <div>{selected.deathDate ? `享年 ${ageAt(selected.birthDate, selected.deathDate)}` : `${ageAt(selected.birthDate, null)}歳（現在）`}</div>
            {selected.status === "emperor" && selected.accession && (
              <div>在位 {fmtDate(selected.accession)} 〜 {selected.abdication ? fmtDate(selected.abdication) : selected.deathDate ? fmtDate(selected.deathDate) : "—"}</div>
            )}
          </div>
          <div className="flex flex-col gap-2">
            <ActionButton label="＋ 親を追加" onClick={() => setModal({ mode: "parent", targetId: selected.id })} disabled={selected.parents.length >= 2} />
            <ActionButton label="＋ 子を追加" onClick={() => setModal({ mode: "child", targetId: selected.id })} />
            <ActionButton label="＋ 配偶者を追加" onClick={() => setModal({ mode: "spouse", targetId: selected.id })} disabled={selected.spouses.length > 0} />
            <ActionButton label="⇄ 既存から配偶者" onClick={() => setPicker({ mode: "spouse", targetId: selected.id })} disabled={selected.spouses.length > 0} />
            <ActionButton label="⇄ 既存から養子" onClick={() => setPicker({ mode: "adopt", targetId: selected.id })} />
            <ActionButton label="✎ 編集" onClick={() => setModal({ mode: "edit", targetId: selected.id })} />
            <ActionButton label="✕ 削除" danger onClick={() => deletePerson(selected.id)} />
          </div>
        </div>
      )}

      {modal && (
        <PersonModal
          modal={modal}
          people={people}
          onClose={() => setModal(null)}
          onSubmit={(form) => (modal.mode === "edit" ? updatePerson(modal.targetId, form) : modal.mode === "root" ? addRootPerson(form) : addPerson(modal.mode, modal.targetId, form))}
        />
      )}

      {picker && people[picker.targetId] && (() => {
        const target = people[picker.targetId];
        let candidates;
        if (picker.mode === "spouse") {
          const anc = collectAncestors(people, picker.targetId);
          const desc = collectDescendants(people, picker.targetId);
          candidates = Object.values(people).filter((p) => p.id !== picker.targetId && !p.spouses.length && !anc.has(p.id) && !desc.has(p.id) && !target.spouses.includes(p.id));
        } else {
          const anc = collectAncestors(people, picker.targetId);
          candidates = Object.values(people).filter((p) => p.id !== picker.targetId && !anc.has(p.id) && !target.children.includes(p.id) && !target.spouses.includes(p.id));
        }
        return (
          <PersonPicker
            mode={picker.mode}
            target={target}
            candidates={candidates}
            onClose={() => setPicker(null)}
            onPick={(id) => (picker.mode === "spouse" ? linkSpouse(picker.targetId, id) : adoptExisting(picker.targetId, id))}
          />
        );
      })()}
    </div>
  );
}

function ActionButton({ label, onClick, disabled, danger }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        textAlign: "left",
        padding: "7px 12px",
        borderRadius: 6,
        fontSize: 13,
        border: `1px solid ${danger ? "#A73B2E55" : "#C9BFA8"}`,
        background: disabled ? "#E7E0CE" : danger ? "#FBEDEA" : "#FFFDF8",
        color: disabled ? "#A79C82" : danger ? "#A73B2E" : "#262220",
        cursor: disabled ? "not-allowed" : "pointer",
      }}
    >
      {label}
    </button>
  );
}

function PersonModal({ modal, people, onClose, onSubmit }) {
  const editing = modal.mode === "edit";
  const base = editing ? people[modal.targetId] : null;

  // 子を追加：父（男親）の氏・姓を引き継ぐ／配偶者を追加：相手の氏・姓を共有
  let inheritUji = "";
  let inheritSei = "";
  if (!editing && modal.mode === "child" && people[modal.targetId]) {
    const t = people[modal.targetId];
    const spouse = t.spouses[0] ? people[t.spouses[0]] : null;
    const father = t.gender === "m" ? t : spouse && spouse.gender === "m" ? spouse : t;
    inheritUji = father.uji || "";
    inheritSei = father.sei || "";
  } else if (!editing && modal.mode === "spouse" && people[modal.targetId]) {
    const t = people[modal.targetId];
    inheritUji = t.uji || "";
    inheritSei = t.sei || "";
  }

  const bParts = splitDate(base?.birthDate);
  const dParts = splitDate(base?.deathDate);
  const aParts = splitDate(base?.accession);
  const xParts = splitDate(base?.abdication);
  const [form, setForm] = useState({
    uji: base ? base.uji || "" : inheritUji,
    mei: base?.mei || "",
    sei: base ? base.sei || "" : inheritSei,
    gender: base?.gender || "m",
    status: base?.status || "general",
    order: base?.order || "",
    teimei: base?.teimei || "",
    bY: bParts.y, bM: bParts.m, bD: bParts.d,
    dY: dParts.y, dM: dParts.m, dD: dParts.d,
    aY: aParts.y, aM: aParts.m, aD: aParts.d,
    xY: xParts.y, xM: xParts.m, xD: xParts.d,
  });
  const title = editing ? "人物を編集" : modal.mode === "root" ? "最初の人物を追加" : `${REL_LABEL[modal.mode]}を追加`;
  const preview = displayName({ uji: form.uji, mei: form.mei, sei: form.status === "general" ? form.sei : null, status: form.status, teimei: form.teimei });

  // 即位年月日：未入力なら一代前の皇帝の退位（なければ没）年月日をデフォルトで入れる
  useEffect(() => {
    if (form.status !== "emperor" || !form.order || form.aY) return;
    const prevOrder = Number(form.order) - 1;
    const prev = Object.values(people).find(
      (p) => p.status === "emperor" && p.order === prevOrder && (!editing || p.id !== modal.targetId)
    );
    const abd = prev && (prev.abdication || prev.deathDate);
    if (abd) {
      const { y, m, d } = splitDate(abd);
      setForm((f) => (f.aY ? f : { ...f, aY: y, aM: m, aD: d }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [form.order, form.status]);

  return (

function App() {
  const [saves, setSaves] = useState(loadSaves);
  const [currentId, setCurrentId] = useState(null);
  const [nameModal, setNameModal] = useState(null); // { mode: 'create'|'rename', id? }

  useEffect(() => { persistSaves(saves); }, [saves]);

  const updatePeople = useCallback((id, people) => {
    setSaves((prev) => (prev[id] ? { ...prev, [id]: { ...prev[id], people, updatedAt: Date.now() } } : prev));
  }, []);

  const createSave = (name) => {
    const id = sid();
    setSaves((prev) => ({ ...prev, [id]: { id, name: name || "無題の家系図", updatedAt: Date.now(), people: {} } }));
    setNameModal(null);
    setCurrentId(id);
  };
  const renameSave = (id, name) => {
    setSaves((prev) => ({ ...prev, [id]: { ...prev[id], name: name || prev[id].name, updatedAt: Date.now() } }));
    setNameModal(null);
  };
  const duplicateSave = (id) => {
    const nid = sid();
    setSaves((prev) => ({ ...prev, [nid]: { id: nid, name: prev[id].name + "（コピー）", updatedAt: Date.now(), people: JSON.parse(JSON.stringify(prev[id].people)) } }));
  };
  const deleteSave = (id) => {
    setSaves((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  };
  const restoreSave = (name, people) => {
    const id = sid();
    setSaves((prev) => ({ ...prev, [id]: { id, name, updatedAt: Date.now(), people } }));
  };

  if (currentId && saves[currentId]) {
    return (
      <Editor
        key={currentId}
        save={saves[currentId]}
        onUpdatePeople={(people) => updatePeople(currentId, people)}
        onBack={() => setCurrentId(null)}
      />
    );
  }

  return (
    <>
      <MenuScreen
        saves={saves}
        onOpen={setCurrentId}
        onCreate={() => setNameModal({ mode: "create" })}
        onRename={(id) => setNameModal({ mode: "rename", id })}
        onDuplicate={duplicateSave}
        onDelete={deleteSave}
        onRestore={restoreSave}
      />
      {nameModal && (
        <NameModal
          mode={nameModal.mode}
          initial={nameModal.mode === "rename" ? saves[nameModal.id]?.name : ""}
          onClose={() => setNameModal(null)}
          onSubmit={(name) => (nameModal.mode === "rename" ? renameSave(nameModal.id, name) : createSave(name))}
        />
      )}
    </>
  );
}

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "48px 20px 60px" }}>

        <h1 className="kn-title" style={{ fontSize: 34, color: "#262220", letterSpacing: 2 }}>家系年表</h1>

        <div className="flex gap-2 mb-5">
          <button

            style={{ flex: 2, padding: "14px", borderRadius: 12, background: "#A73B2E", color: "#FBF7ED", fontWeight: 700, fontSize: 15, cursor: "pointer", boxShadow: "0 2px 6px #A73B2E33" }}
          >

          </button>
          <button
            onClick={() => setRestoreOpen(true)}
            style={{ flex: 1, padding: "14px", borderRadius: 12, background: "#FBF7ED", color: "#6B5B47", fontWeight: 600, fontSize: 13, cursor: "pointer", border: "1px solid #C9BFA8" }}
          >
            ⭯ 復元
          </button>

        <div className="flex flex-col gap-3">
          {list.map((s) => (
            <div key={s.id} className="rounded-xl" style={{ background: "#FBF7ED", border: "1px solid #C9BFA8", boxShadow: "0 1px 3px #00000012", overflow: "hidden" }}>
              <button
                onClick={() => onOpen(s.id)}
                style={{ width: "100%", textAlign: "left", padding: "16px 18px", cursor: "pointer", background: "transparent" }}
              >
                <div className="kn-title" style={{ fontSize: 19, color: "#262220" }}>{s.name}</div>
                <div className="kn-mono mt-1" style={{ fontSize: 11, color: "#8A7F68" }}>
                  {personCount(s)}名 ・ 最終更新 {fmtTime(s.updatedAt) || "—"}
                </div>
              </button>
              <div className="flex flex-wrap" style={{ borderTop: "1px solid #EAE2CF" }}>
                <MenuAction label="開く" onClick={() => onOpen(s.id)} primary />
                <MenuAction label="バックアップ" onClick={() => setBackupId(s.id)} />
                <MenuAction label="複製" onClick={() => onDuplicate(s.id)} />
                <MenuAction label="名前変更" onClick={() => onRename(s.id)} />
                <MenuAction label="削除" onClick={() => setConfirmId(s.id)} danger disabled={list.length <= 1} />
              </div>

          ))}
        </div>

        <p className="mt-6 text-xs" style={{ color: "#A08A5E", lineHeight: 1.7 }}>

        />

      {confirmId && (
        <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }} onClick={() => setConfirmId(null)}>
          <div onClick={(e) => e.stopPropagation()} style={{ width: 320, background: "#FBF7ED", borderRadius: 10, padding: 20, border: "1px solid #C9BFA8" }}>
            <h2 className="kn-title text-lg mb-2" style={{ color: "#262220" }}>削除しますか？</h2>

            <div className="flex justify-end gap-2">
              <button onClick={() => setConfirmId(null)} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 13, color: "#6B6152" }}>キャンセル</button>
              <button onClick={() => { onDelete(confirmId); setConfirmId(null); }} style={{ padding: "8px 16px", borderRadius: 6, fontSize: 13, background: "#A73B2E", color: "#FBF7ED", fontWeight: 600 }}>削除</button>

          </div>

function BackupModal({ save, onClose }) {
  const [toast, setToast] = useState("");
  const payload = useMemo(() => buildBackup(save), [save]);
  const taRef = useRef(null);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(""), 1800); };
  const doDownload = () => flash(downloadText(safeFilename(save.name), payload) ? "ファイルを書き出しました" : "ダウンロードできませんでした。下のテキストをコピーしてください");
  const doCopy = async () => {
    try { await navigator.clipboard.writeText(payload); flash("コピーしました"); }
    catch { if (taRef.current) { taRef.current.select(); document.execCommand?.("copy"); } flash("コピーしました"); }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 380, maxWidth: "92vw", background: "#FBF7ED", borderRadius: 10, padding: 20, border: "1px solid #C9BFA8" }}>
        <h2 className="kn-title text-lg mb-1" style={{ color: "#262220" }}>バックアップ</h2>
        <p className="text-xs mb-3" style={{ color: "#6B6152" }}>「{save.name}」（{personCount(save)}名）をファイルに書き出します。復元時はこのファイル、または下のテキストを使います。</p>
        <div className="flex gap-2 mb-3">
          <button onClick={doDownload} style={{ flex: 1, padding: "10px", borderRadius: 8, background: "#A73B2E", color: "#FBF7ED", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>ファイルをダウンロード</button>
          <button onClick={doCopy} style={{ flex: 1, padding: "10px", borderRadius: 8, background: "#FFFDF8", color: "#6B5B47", fontWeight: 600, fontSize: 13, cursor: "pointer", border: "1px solid #C9BFA8" }}>コピー</button>
        </div>
        <textarea ref={taRef} readOnly value={payload} onFocus={(e) => e.target.select()} style={{ width: "100%", height: 120, fontSize: 11, fontFamily: "monospace", padding: 8, borderRadius: 6, border: "1px solid #C9BFA8", background: "#FFFDF8", color: "#4A4335", resize: "vertical" }} />
        <div className="flex items-center justify-between mt-3">
          <span className="text-xs" style={{ color: "#1F9E7A" }}>{toast}</span>
          <button onClick={onClose} style={{ padding: "8px 16px", borderRadius: 6, fontSize: 13, color: "#6B6152" }}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

function RestoreModal({ onClose, onRestore }) {
  const [text, setText] = useState("");
  const [err, setErr] = useState("");

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { setText(String(reader.result || "")); setErr(""); };
    reader.onerror = () => setErr("ファイルを読み込めませんでした");
    reader.readAsText(file);
  };
  const doRestore = () => {
    try {
      const { name, people } = parseBackup(text);
      onRestore(`${name}（復元）`, people);
    } catch (e) {
      setErr(e.message || "読み込めませんでした");
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 380, maxWidth: "92vw", background: "#FBF7ED", borderRadius: 10, padding: 20, border: "1px solid #C9BFA8" }}>
        <h2 className="kn-title text-lg mb-1" style={{ color: "#262220" }}>バックアップから復元</h2>
        <p className="text-xs mb-3" style={{ color: "#6B6152" }}>バックアップファイルを選ぶか、テキストを貼り付けてください。新しいセーブデータとして追加されます。</p>
        <input type="file" accept=".json,application/json" onChange={onFile} className="text-xs mb-3" style={{ color: "#6B5B47" }} />
        <textarea value={text} onChange={(e) => { setText(e.target.value); setErr(""); }} placeholder="ここにJSONを貼り付けることもできます" style={{ width: "100%", height: 110, fontSize: 11, fontFamily: "monospace", padding: 8, borderRadius: 6, border: "1px solid #C9BFA8", background: "#FFFDF8", color: "#4A4335", resize: "vertical" }} />
        {err && <div className="text-xs mt-2" style={{ color: "#A73B2E" }}>{err}</div>}
        <div className="flex justify-end gap-2 mt-3">
          <button onClick={onClose} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 13, color: "#6B6152" }}>キャンセル</button>
          <button onClick={doRestore} disabled={!text.trim()} style={{ padding: "8px 16px", borderRadius: 6, fontSize: 13, background: text.trim() ? "#A73B2E" : "#E7E0CE", color: text.trim() ? "#FBF7ED" : "#A79C82", fontWeight: 600, cursor: text.trim() ? "pointer" : "not-allowed" }}>復元</button>
        </div>
      </div>
    </div>
  );
}

function MenuAction({ label, onClick, primary, danger, disabled }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        flex: 1,
        padding: "10px 4px",
        fontSize: 12.5,
        fontWeight: primary ? 700 : 500,
        color: disabled ? "#B7AD97" : danger ? "#A73B2E" : primary ? "#A73B2E" : "#6B6152",
        background: "transparent",
        borderLeft: "1px solid #EAE2CF",
        cursor: disabled ? "not-allowed" : "pointer",
      }}
    >
      {label}
    </button>
  );
}

function NameModal({ mode, initial, onClose, onSubmit }) {
  const [name, setName] = useState(initial || "");
  const title = mode === "rename" ? "名前を変更" : "新しい家系図の名前";
  return (
    <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 330, background: "#FBF7ED", borderRadius: 10, padding: 20, border: "1px solid #C9BFA8" }}>
        <h2 className="kn-title text-lg mb-3" style={{ color: "#262220" }}>{title}</h2>
        <input
          autoFocus
          value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && name.trim() && onSubmit(name.trim())}
          style={inputStyle}
          placeholder="例：徳川家、我が家 など"
        />
        <div className="flex justify-end gap-2 mt-4">
          <button onClick={onClose} style={{ padding: "8px 14px", borderRadius: 6, fontSize: 13, color: "#6B6152" }}>キャンセル</button>
          <button onClick={() => name.trim() && onSubmit(name.trim())} style={{ padding: "8px 16px", borderRadius: 6, fontSize: 13, background: "#A73B2E", color: "#FBF7ED", fontWeight: 600 }}>
            {mode === "rename" ? "変更" : "作成して開く"}
          </button>
        </div>
      </div>
    </div>
  );
}

const inputStyle = {
  width: "100%",
  padding: "7px 10px",
  fontSize: 13,
  border: "1px solid #C9BFA8",
  borderRadius: 6,
  background: "#FFFDF8",
  color: "#262220",
};


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
